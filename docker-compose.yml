# ============================================================
# AI Shorts Engine — Docker Compose
# ============================================================

version: "3.9"

services:
  # ── Ollama LLM Server ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: video-engine-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── AI Shorts Engine ──────────────────────────────────────
  video-engine:
    build: .
    container_name: video-engine-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    volumes:
      - ./output:/app/output
      - ./config:/app/config
      - ./assets:/app/assets
      - ./logs:/app/logs
    depends_on:
      - ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
